name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check api/ research/train_v2.py research/prepare_v2.py research/export_results.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "research/[dev,api]"
      - run: pytest tests/ -v

  model-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install scikit-learn numpy scipy pandas joblib
      - name: Train and validate model quality
        run: |
          cd research
          python3 train_v2.py 2>&1 | tee train_output.txt
          VAL_MAE=$(grep 'val_mae:' train_output.txt | head -1 | awk '{print $2}')
          echo "val_mae = $VAL_MAE"
          python3 -c "
          mae = float('$VAL_MAE')
          assert mae < 1.95, f'val_mae {mae} exceeds threshold 1.95'
          print(f'Model quality gate PASSED: val_mae={mae:.4f} < 1.95')
          "
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            research/model.joblib
            research/model_quantiles.joblib
          retention-days: 30

  data-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install numpy scikit-learn scipy pandas joblib
      - name: Validate dataset
        run: cd research && python3 validate_data.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t coffee-ai:test .
      - name: Smoke test container
        run: |
          docker run -d --name coffee-test -p 8000:8000 coffee-ai:test
          sleep 5
          curl -sf http://localhost:8000/api/health | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['status'] == 'ok', f'Health check failed: {data}'
          assert data['model_loaded'], 'Model not loaded in container'
          print('Docker smoke test PASSED')
          "
          docker stop coffee-test
